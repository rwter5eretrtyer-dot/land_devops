- name: Send Telegram message
  env:
    TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
    TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    RESULT: ${{ needs.quality.result }}
    RELEASE_URL: ${{ needs.release.outputs.release_url }}
  run: |
    echo "Start Telegram step"

    if [ -z "$TELEGRAM_TOKEN" ]; then
      echo "TELEGRAM_TOKEN is empty → skip"
      exit 0
    fi

    STATUS="SUCCESS"
    if [ "$RESULT" != "success" ]; then
      STATUS="FAILED"
    fi

    TEXT=$(printf "Pipeline: %s\nRepository: %s\nBranch: %s\nRelease: %s" \
      "$STATUS" \
      "${{ github.repository }}" \
      "${{ github.ref_name }}" \
      "$RELEASE_URL")

    RESP=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
      -d "chat_id=${TELEGRAM_CHAT_ID}" \
      --data-urlencode "text=${TEXT}")

    echo "$RESP"
