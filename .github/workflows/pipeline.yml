name: CI quality + release + telegram

on:
  push:
    branches:
      - dev

permissions:
  contents: write

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest

    outputs:
      flake8_exit_code: ${{ steps.flake8.outputs.exit_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 and save report
        id: flake8
        run: |
          mkdir -p reports
          set +e
          flake8 . > reports/flake8_report.txt 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: reports/flake8_report.txt

      - name: Fail if flake8 found issues
        if: steps.flake8.outputs.exit_code != '0'
        run: exit 1

  release:
    needs: quality
    if: needs.quality.result == 'success'
    runs-on: ubuntu-latest

    outputs:
      release_url: ${{ steps.create_release.outputs.url }}
      release_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release tag
        id: tag
        run: |
          TAG="release-$(date +'%Y%m%d-%H%M%S')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            Automatic release after push to dev.

      - name: Upload flake8 report to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: reports/flake8_report.txt

  telegram_notify:
    needs:
      - quality
      - release
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          RELEASE_URL: ${{ needs.release.outputs.release_url }}
          RELEASE_TAG: ${{ needs.release.outputs.release_tag }}
        run: |
          echo "Starting Telegram notification"

          if [ -z "$TELEGRAM_TOKEN" ]; then
            echo "TELEGRAM_TOKEN is empty. Skip notification."
            exit 0
          fi

          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_CHAT_ID is empty. Skip notification."
            exit 0
          fi

          STATUS_EMOJI="✅"
          STATUS_TEXT="SUCCESS"

          if [ "$QUALITY_RESULT" != "success" ]; then
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILED"
          fi

          TEXT=$(printf "%s Pipeline Result: %s\nRepository: %s\nBranch: %s\nRelease tag: %s\nRelease URL: %s\nRun URL: %s/%s/actions/runs/%s" \
            "$STATUS_EMOJI" \
            "$STATUS_TEXT" \
            "${{ github.repository }}" \
            "${{ github.ref_name }}" \
            "$RELEASE_TAG" \
            "$RELEASE_URL" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")

          RESP=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}")

          echo "Telegram response:"
          echo "$RESP"

          if echo "$RESP" | grep -q '"ok":true'; then
            echo "Telegram sent successfully"
          else
            echo "Telegram failed, but pipeline will continue"
          fi
